stages:
  - deploy

deploy_develop:
  stage: deploy
  image: alpine:latest

  before_script:
    # Installer SSH
    - apk add --no-cache openssh-client

    # Lancer l'agent SSH
    - eval $(ssh-agent -s)

    # Ajouter la clé privée (depuis GitLab CI/CD variables)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -

    # Configurer SSH
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh

    # Ajouter le serveur aux hôtes connus
    - ssh-keyscan -p 6543 209.142.65.178 >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

  script:
    - |
      set -e

      ssh -p 6543 sunofamap@209.142.65.178 "
        cd canaanapp.com && \
        git pull origin develop && \
        scl enable php82 -- composer install --no-dev --optimize-autoloader && \
        scl enable php82 -- php artisan migrate --force && \
        scl enable php82 -- php artisan optimize:clear
      "

  only:
    - develop

  environment:
    name: production
    url: https://canaanapp.com